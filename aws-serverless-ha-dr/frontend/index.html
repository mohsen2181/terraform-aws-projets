<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Secure HA App</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>

<body class="bg-light">

<div class="container mt-5">

  <h1 class="text-center mb-4">
    Secure High Availability App
  </h1>

  <!-- LOGIN -->

  <div class="card mb-4">
    <div class="card-body">

      <h3 class="mb-3">Login</h3>

      <div class="mb-3">
        <input
          type="email"
          id="email"
          class="form-control"
          placeholder="Email"
        />
      </div>

      <div class="mb-3">
        <input
          type="password"
          id="password"
          class="form-control"
          placeholder="Password"
        />
      </div>

      <button class="btn btn-success" onclick="login()">
        Login
      </button>

    </div>
  </div>

  <!-- DATA -->

  <div class="card mb-4">
    <div class="card-body">

      <h3 class="mb-3">Add Data</h3>

      <div class="mb-3">
        <input
          type="text"
          id="itemId"
          class="form-control"
          placeholder="Item ID"
        />
      </div>

      <div class="mb-3">
        <input
          type="text"
          id="itemData"
          class="form-control"
          placeholder="Item Data"
        />
      </div>

      <button class="btn btn-primary" onclick="writeData()">
        Save
      </button>

    </div>
  </div>

  <!-- LIST -->

  <div class="card">
    <div class="card-body">

      <h3 class="mb-3">Data List</h3>

      <ul id="dataList" class="list-group"></ul>

    </div>
  </div>

</div>

<script>

const apiUrl = "https://api.aws-labs.click";

/*
  Replace with your Terraform outputs
*/

const region = "eu-west-3";
const clientId = "1b45ptfo9ufj0gsmiu1e951od3";

let idToken = localStorage.getItem("idToken");

/*
  LOGIN
*/

async function login() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const response = await fetch(
    `https://cognito-idp.${region}.amazonaws.com/`,
    {
      method: "POST",

      headers: {
        "Content-Type": "application/x-amz-json-1.1",
        "X-Amz-Target":
          "AWSCognitoIdentityProviderService.InitiateAuth"
      },

      body: JSON.stringify({
        AuthFlow: "USER_PASSWORD_AUTH",
        ClientId: clientId,

        AuthParameters: {
          USERNAME: email,
          PASSWORD: password
        }
      })
    }
  );

  const data = await response.json();

  console.log(data);

  if (data.AuthenticationResult) {

    idToken = data.AuthenticationResult.IdToken;

    localStorage.setItem("idToken", idToken);

    alert("Login successful");

    readData();

  } else {

    alert(JSON.stringify(data));
  }
}

/*
  WRITE
*/

async function writeData() {

  if (!idToken) {
    alert("Please login first");
    return;
  }

  const itemId = document.getElementById("itemId").value;
  const itemData = document.getElementById("itemData").value;

  const response = await fetch(`${apiUrl}/write`, {

    method: "POST",

    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${idToken}`
    },

    body: JSON.stringify({
      ItemId: itemId,
      Data: itemData
    })
  });

  const result = await response.json();

  alert(result.message || result.error);

  readData();
}

/*
  READ
*/

async function readData() {

  if (!idToken) {
    return;
  }

  const response = await fetch(`${apiUrl}/read`, {

    headers: {
      "Authorization": `Bearer ${idToken}`
    }
  });

  const data = await response.json();

  const dataList = document.getElementById("dataList");

  dataList.innerHTML = "";

  data.forEach(item => {

    const li = document.createElement("li");

    li.className = "list-group-item";

    li.textContent =
      `ID: ${item.ItemId}, Data: ${item.Data}`;

    dataList.appendChild(li);
  });
}

/*
  AUTO LOAD
*/

if (idToken) {
  readData();
}

</script>

</body>
</html>
